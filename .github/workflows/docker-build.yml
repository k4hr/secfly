name: Проверка контейнеров
on:
  push:
  pull_request:
permissions:
  contents: read
jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        dockerfile: [infra/docker/ground-control.Dockerfile, infra/docker/server.Dockerfile]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - uses: docker/build-push-action@v6
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: false
          build-args: SECFLY_APP_PACKAGE=@secfly/onboard-core
